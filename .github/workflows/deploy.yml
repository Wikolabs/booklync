name: Deploy booklync

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/wikolabs/booklync:latest .
          docker push ghcr.io/wikolabs/booklync:latest

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.WIKOLABS_VM_HOST }}
          username: ${{ secrets.WIKOLABS_VM_USER }}
          key: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull ghcr.io/wikolabs/booklync:latest
            docker stop booklync 2>/dev/null || true
            docker rm booklync 2>/dev/null || true
            docker run -d               --name booklync               -p 3005:3000               --restart unless-stopped               ghcr.io/wikolabs/booklync:latest
            echo "Deployed booklync on port 3005"
